<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | JWT Decoder</title>

<meta name="description" content="Free online JWT Decoder to decode, inspect and validate JSON Web Tokens directly in your browser. View JWT header, payload, algorithm, expiration, issued-at data and token status instantly.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://xavert.com/tools/jwt-decoder.html">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
line-height:1.1;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
margin-bottom:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:14px;
background:white;
resize:vertical;
font-family:monospace;
}

#jwtInput{
min-height:140px;
}

.output{
min-height:220px;
}

textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.info-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:20px;
}

.info-box{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
text-align:center;
}

.info-box strong{
display:block;
font-size:18px;
margin-bottom:6px;
}

.info-box span{
font-size:13px;
color:#6b7280;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.success{color:#047857;}
.error{color:#dc2626;}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}
.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

.toast-info{
background:#111827 !important;
}
@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.info-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

h1{
font-size:34px;
}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>JWT Decoder</h1>

<p class="subtitle">
Decode and inspect JSON Web Tokens directly in your browser.
</p>
<div style="
background:#ecfdf5;
border:1px solid #a7f3d0;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
font-size:14px;
font-weight:700;
color:#047857;
">
✓ JWT tokens are decoded locally in your browser. Nothing is uploaded or stored.
</div>
<div class="card">

<label for="jwtInput">JWT Token</label>

<div style="margin-bottom:10px;font-size:13px;color:#6b7280;">
<a href="#" onclick="loadSampleJWT();return false;">Load Sample JWT</a>
</div>

<textarea
id="jwtInput"
placeholder="Paste your JWT token here..."
></textarea>

<div class="button-group">

<button onclick="decodeJWT()">
Decode JWT
</button>

<button onclick="copyToken()">
Copy Token
</button>

<button onclick="clearAll()">
Clear
</button>

</div>

<div id="message" class="message"></div>

<div class="info-grid">

<div class="info-box">
<strong id="algValue">-</strong>
<span>Algorithm</span>
</div>

<div class="info-box">
<strong id="expValue">-</strong>
<span>Expires</span>
</div>

<div class="info-box">
<strong id="iatValue">-</strong>
<span>Issued At</span>
</div>

<div class="info-box">
<strong id="statusValue">-</strong>
<span>Status</span>
</div>

<div class="info-box">
<strong id="lengthValue">-</strong>
<span>Token Length</span>
</div>
  
</div>

<div class="grid">

<div>

<label>Header</label>

<textarea
id="headerOutput"
class="output"
readonly
></textarea>

<div class="button-group">
<button onclick="copyHeader()">
Copy Header
</button>
</div>

</div>

<div>

<label>Payload</label>

<textarea
id="payloadOutput"
class="output"
readonly
></textarea>

<div class="button-group">
<button onclick="copyPayload()">
Copy Payload
</button>

<button onclick="copyDecodedJWT()">
Copy All
</button>

<button onclick="downloadDecodedJWT()">
Download JSON
</button>
</div>

</div>

</div>

</div>

</div>

<div style="
text-align:center;
color:#6b7280;
font-size:13px;
margin-top:28px;
">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const toast=document.getElementById("toast");

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){
decodeJWT();
}

});

function showToast(text,type="info"){

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}

function setMessage(text,type){

const message=document.getElementById("message");

message.textContent=text;
message.className="message " + type;

}

function base64UrlDecode(str){

str=str.replace(/-/g,"+").replace(/_/g,"/");

while(str.length % 4){
str += "=";
}

return atob(str);

}

function formatDate(timestamp){

if(!timestamp){
return "-";
}

return new Date(timestamp * 1000).toLocaleString();

}
function loadSampleJWT(){

document.getElementById("jwtInput").value=
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IlhBVkVSVCBVc2VyIiwiaWF0IjoxNzEwMDAwMDAwLCJleHAiOjQxMDI0NDQ4MDB9.sample-signature";

setMessage("Sample JWT loaded.","success");
showToast("Sample JWT loaded.","success");

}
function decodeJWT(){

try{

const token=document
.getElementById("jwtInput")
.value
.trim();

if(!token){

setMessage(
"Please enter a JWT token.",
"error"
);

return;

}

const parts=token.split(".");

if(parts.length !== 3){

setMessage(
"Invalid JWT format.",
"error"
);

return;

}

const header=JSON.parse(
base64UrlDecode(parts[0])
);

const payload=JSON.parse(
base64UrlDecode(parts[1])
);

document.getElementById("headerOutput").value=
JSON.stringify(header,null,2);

document.getElementById("payloadOutput").value=
JSON.stringify(payload,null,2);

document.getElementById("algValue").textContent=
header.alg || "-";

document.getElementById("expValue").textContent=
payload.exp
? formatDate(payload.exp)
: "-";

document.getElementById("iatValue").textContent=
payload.iat
? formatDate(payload.iat)
: "-";

let status="Unknown";

if(payload.exp){

status=
(Date.now()/1000 > payload.exp)
? "Expired"
: "Valid";

}

const statusElement=document.getElementById("statusValue");

statusElement.textContent=status;

if(status==="Valid"){
statusElement.style.color="#047857";
}

if(status==="Expired"){
statusElement.style.color="#dc2626";
}

if(status==="Unknown"){
statusElement.style.color="#111827";
}
document.getElementById("lengthValue").textContent=
token.length;
setMessage(
"JWT decoded successfully.",
"success"
);
showToast("JWT decoded successfully.","success");
}catch(error){

console.error(error);

setMessage(
"Unable to decode JWT.",
"error"
);

}

}

function copyText(text){

if(!text){
showToast("Nothing to copy.","error");
return;
}

navigator.clipboard.writeText(text);

showToast("Copied.","success");

}
function copyToken(){

copyText(
document.getElementById("jwtInput").value
);

}
function copyHeader(){

copyText(
document.getElementById("headerOutput").value
);

}

function copyPayload(){

copyText(
document.getElementById("payloadOutput").value
);

}
function copyDecodedJWT(){

const header=document.getElementById("headerOutput").value;
const payload=document.getElementById("payloadOutput").value;

if(!header || !payload){
showToast("Nothing to copy.","error");
return;
}

copyText(
"HEADER\n\n" +
header +
"\n\nPAYLOAD\n\n" +
payload
);

}
function downloadDecodedJWT(){

const header=document.getElementById("headerOutput").value;
const payload=document.getElementById("payloadOutput").value;

if(!header || !payload){
showToast("Nothing to download.","error");
return;
}

const data={
header:JSON.parse(header),
payload:JSON.parse(payload)
};

const blob=new Blob(
[JSON.stringify(data,null,2)],
{
type:"application/json;charset=utf-8"
}
);

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="xavert-decoded-jwt.json";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started.","success");

}
function clearAll(){

document.getElementById("jwtInput").value="";
document.getElementById("headerOutput").value="";
document.getElementById("payloadOutput").value="";

document.getElementById("algValue").textContent="-";
document.getElementById("expValue").textContent="-";
document.getElementById("iatValue").textContent="-";
document.getElementById("statusValue").textContent="-";
document.getElementById("lengthValue").textContent="-";
document.getElementById("message").textContent="";
showToast("Cleared.","success");
}

</script>

</body>
</html>
