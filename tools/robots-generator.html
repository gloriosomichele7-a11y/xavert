<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | Robots.txt Generator</title>

<meta name="description" content="Generate SEO-friendly robots.txt files for search engines directly in your browser.">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:white;
}

textarea{
min-height:280px;
resize:vertical;
font-family:monospace;
line-height:1.6;
}

input:focus,
select:focus,
textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.success{
color:#047857;
}

.error{
color:#dc2626;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}

.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

h1{
font-size:34px;
}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>Robots.txt Generator</h1>

<p class="subtitle">
Create robots.txt files for search engines and website crawling control.
</p>

<div class="card">

<div class="grid">

<div>

<label>User-Agent</label>
<select id="userAgent">
<option value="*">*</option>
<option value="Googlebot">Googlebot</option>
<option value="Bingbot">Bingbot</option>
<option value="Googlebot-Image">Googlebot-Image</option>
</select>

<label>Disallow Path</label>
<input id="disallow" type="text" placeholder="/private/">

<label>Allow Path</label>
<input id="allow" type="text" placeholder="/public/">

<label>Crawl Delay (optional)</label>
<input id="crawlDelay" type="number" placeholder="10">

<label>Sitemap URL</label>
<input id="sitemap" type="url" placeholder="https://example.com/sitemap.xml">

<div class="button-group">
<button onclick="generateRobots()">Generate</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="message" class="message"></div>

</div>

<div>

<label>robots.txt Output</label>

<textarea
id="output"
readonly
placeholder="Generated robots.txt will appear here..."
></textarea>

<div class="button-group">
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadRobots()">Download robots.txt</button>
</div>

</div>

</div>

</div>

</div>

<div style="
text-align:center;
color:#6b7280;
font-size:13px;
margin-top:28px;
">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const toast=document.getElementById("toast");

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){
generateRobots();
}

});

function showToast(text,type="success"){

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}

function setMessage(text,type){

const message=document.getElementById("message");

message.textContent=text;
message.className="message " + type;

}

function generateRobots(){

const userAgent=document.getElementById("userAgent").value;
const disallow=document.getElementById("disallow").value.trim();
const allow=document.getElementById("allow").value.trim();
const crawlDelay=document.getElementById("crawlDelay").value.trim();
const sitemap=document.getElementById("sitemap").value.trim();

let robots="";

robots += "User-agent: " + userAgent + "\n";

robots += "Disallow: " + (disallow || "") + "\n";

if(allow){
robots += "Allow: " + allow + "\n";
}

if(crawlDelay){
robots += "Crawl-delay: " + crawlDelay + "\n";
}

if(sitemap){
robots += "\nSitemap: " + sitemap + "\n";
}

document.getElementById("output").value=robots;

setMessage(
"robots.txt generated successfully.",
"success"
);

}

function copyOutput(){

const text=document.getElementById("output").value;

if(!text){
showToast("Nothing to copy","error");
return;
}

navigator.clipboard.writeText(text);

showToast("Copied");

}

function downloadRobots(){

const text=document.getElementById("output").value;

if(!text){
showToast("Nothing to download","error");
return;
}

const blob=new Blob([text],{
type:"text/plain;charset=utf-8"
});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="robots.txt";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started");

}

function clearAll(){

document.getElementById("userAgent").value="*";
document.getElementById("disallow").value="";
document.getElementById("allow").value="";
document.getElementById("crawlDelay").value="";
document.getElementById("sitemap").value="";
document.getElementById("output").value="";

document.getElementById("message").textContent="";
document.getElementById("message").className="message";

}

</script>

</body>
</html>
