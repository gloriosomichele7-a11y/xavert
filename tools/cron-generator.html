<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | Cron Expression Generator</title>

<meta name="description" content="Free online Cron Expression Generator to create, understand and export cron schedules directly in your browser. Generate cron jobs for Linux, Unix and server automation.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://xavert.com/tools/cron-expression-generator.html">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:#fff;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

select,
input,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
}

textarea{
resize:none;
}

select:focus,
input:focus,
textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

.result{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
padding:16px;
margin-top:16px;
word-break:break-all;
font-family:monospace;
}

.description{
margin-top:14px;
padding:14px;
background:#fef2f2;
border:1px solid #fecaca;
border-radius:12px;
}
#cronOutput{
font-family:monospace;
font-size:18px;
font-weight:700;
text-align:center;
background:#f9fafb;
}
#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

@media(max-width:768px){

body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

h1{
font-size:34px;
}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>Cron Expression Generator</h1>

<p class="subtitle">
Create cron schedules and understand task timing instantly.
</p>

<div class="card">

<div class="grid">

<div>
<label>Cron Presets</label>

<select id="cronPreset" onchange="applyPreset()">
<option value="">Custom</option>
<option value="hourly">Every Hour</option>
<option value="daily">Every Day</option>
<option value="weekly">Every Week</option>
<option value="monthly">Every Month</option>
<option value="yearly">Every Year</option>
</select>
<label>Minute</label>
<input id="minute" value="0">

<label>Hour</label>
<input id="hour" value="0">

<label>Day of Month</label>
<input id="day" value="*">

<label>Month</label>
<input id="month" value="*">

<label>Day of Week</label>
<input id="weekday" value="*">

<div class="button-group">
<button onclick="generateCron()">Generate Cron</button>
<button onclick="clearAll()">Clear</button>
</div>

</div>

<div>

<label>Cron Expression</label>

<textarea
id="cronOutput"
rows="2"
readonly
placeholder="Cron expression will appear here..."
></textarea>
<div id="cronStats" style="margin-top:10px;color:#6b7280;font-size:13px;">
Fields: 0
</div>
<div id="nextRun" style="margin-top:6px;color:#6b7280;font-size:13px;">
Next Run Preview: —
</div>
<div class="button-group">
<button onclick="copyCron()">Copy</button>
<button onclick="downloadCron()">Download TXT</button>
</div>

<div id="cronDescription" class="description">
Waiting for cron generation...
</div>
<div id="cronExamples" style="margin-top:16px;color:#6b7280;font-size:14px;line-height:1.8;">
Popular Examples:
<br><a href="#" onclick="loadExample('*/5 * * * *');return false;">Every 5 minutes</a>
<br><a href="#" onclick="loadExample('0 * * * *');return false;">Every hour</a>
<br><a href="#" onclick="loadExample('0 0 * * *');return false;">Every day at midnight</a>
<br><a href="#" onclick="loadExample('0 8 * * 1');return false;">Every Monday at 08:00</a>
<br><a href="#" onclick="loadExample('0 0 1 * *');return false;">First day of month</a>
</div>
</div>

</div>

</div>

</div>

<div style="text-align:center;color:#6b7280;font-size:13px;margin-top:28px;">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const toast=document.getElementById("toast");
const minute=document.getElementById("minute");
const hour=document.getElementById("hour");
const day=document.getElementById("day");
const month=document.getElementById("month");
const weekday=document.getElementById("weekday");
document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){
generateCron();
}

});

function showToast(text){

toast.textContent=text;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
},2200);

}
function loadExample(expression){

const parts=expression.split(" ");

minute.value=parts[0];
hour.value=parts[1];
day.value=parts[2];
month.value=parts[3];
weekday.value=parts[4];

generateCron();

}
function applyPreset(){

const preset=document.getElementById("cronPreset").value;

if(preset==="hourly"){
minute.value="0";
hour.value="*";
day.value="*";
month.value="*";
weekday.value="*";
}

if(preset==="daily"){
minute.value="0";
hour.value="0";
day.value="*";
month.value="*";
weekday.value="*";
}

if(preset==="weekly"){
minute.value="0";
hour.value="0";
day.value="*";
month.value="*";
weekday.value="0";
}

if(preset==="monthly"){
minute.value="0";
hour.value="0";
day.value="1";
month.value="*";
weekday.value="*";
}

if(preset==="yearly"){
minute.value="0";
hour.value="0";
day.value="1";
month.value="1";
weekday.value="*";
}
if(preset){
generateCron();
}
  
}
function getNextRun(minute,hour,day,month,weekday){

const now=new Date();
let next=new Date(now.getTime()+60000);
next.setSeconds(0);
next.setMilliseconds(0);

for(let i=0;i<525600;i++){

const m=String(next.getMinutes());
const h=String(next.getHours());
const d=String(next.getDate());
const mo=String(next.getMonth()+1);
const w=String(next.getDay());

const minuteMatch=
minute==="*" ||
minute===m ||
(minute.startsWith("*/") && next.getMinutes()%parseInt(minute.slice(2),10)===0);

const hourMatch=hour==="*" || hour===h;
const dayMatch=day==="*" || day===d;
const monthMatch=month==="*" || month===mo;
const weekdayMatch=weekday==="*" || weekday===w;

if(minuteMatch && hourMatch && dayMatch && monthMatch && weekdayMatch){
return next.toLocaleString();
}

next.setMinutes(next.getMinutes()+1);

}

return "Unable to calculate";

}
function generateCron(){
const minuteValue=document.getElementById("minute").value.trim();
const hourValue=document.getElementById("hour").value.trim();
const dayValue=document.getElementById("day").value.trim();
const monthValue=document.getElementById("month").value.trim();
const weekdayValue=document.getElementById("weekday").value.trim();

if(
!minuteValue ||
!hourValue ||
!dayValue ||
!monthValue ||
!weekdayValue
){
showToast("All fields are required");
return;
}
const minute=document.getElementById("minute").value.trim();
const hour=document.getElementById("hour").value.trim();
const day=document.getElementById("day").value.trim();
const month=document.getElementById("month").value.trim();
const weekday=document.getElementById("weekday").value.trim();
const cronRegex=
/^[0-9*/,\-]+$/;

const values=[
minute,
hour,
day,
month,
weekday
];

for(const value of values){

if(
value!=="*" &&
!cronRegex.test(value)
){
showToast(
"Invalid cron value detected"
);
return;
}

}
const cron=
`${minute} ${hour} ${day} ${month} ${weekday}`;

document.getElementById("cronOutput").value=cron;
document.getElementById("cronStats").textContent=
"Fields: " + cron.split(" ").length;
document.getElementById("nextRun").textContent=
"Next Run Preview: " + getNextRun(minute,hour,day,month,weekday);

let description=
`Runs at minute ${minute}, hour ${hour}, day ${day}, month ${month}, weekday ${weekday}.`;

if(
minute==="0" &&
hour==="*" &&
day==="*" &&
month==="*" &&
weekday==="*"
){
description="Runs every hour.";
}

if(
minute==="0" &&
hour==="0" &&
day==="*" &&
month==="*" &&
weekday==="*"
){
description="Runs every day at 00:00.";
}

if(
minute==="0" &&
hour==="0" &&
day==="*" &&
month==="*" &&
weekday==="0"
){
description="Runs every week on Sunday at 00:00.";
}

if(
minute==="0" &&
hour==="0" &&
day==="1" &&
month==="*" &&
weekday==="*"
){
description="Runs on the first day of every month.";
}

if(
minute==="0" &&
hour==="0" &&
day==="1" &&
month==="1" &&
weekday==="*"
){
description="Runs once a year on January 1st.";
}

document.getElementById("cronDescription").innerHTML=
description;
}

function copyCron(){

const text=document.getElementById("cronOutput").value;

if(!text){
showToast("Nothing to copy");
return;
}

navigator.clipboard.writeText(text);

showToast("Copied");

}

function downloadCron(){

const text=document.getElementById("cronOutput").value;

if(!text){
showToast("Nothing to download");
return;
}

const blob=new Blob([text],{
type:"text/plain;charset=utf-8"
});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="xavert-cron-expression.txt";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started");

}

function clearAll(){
document.getElementById("cronPreset").value="";
document.getElementById("minute").value="0";
document.getElementById("hour").value="0";
document.getElementById("day").value="*";
document.getElementById("month").value="*";
document.getElementById("weekday").value="*";

document.getElementById("cronOutput").value="";
document.getElementById("cronStats").textContent=
"Fields: 0";
document.getElementById("nextRun").textContent=
"Next Run Preview: —";
document.getElementById("cronDescription").innerHTML=
"Waiting for cron generation...";

}

</script>

</body>
</html>
