<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAVERT | File Hash Checker</title>

<meta name="description" content="Generate and verify SHA-256, SHA-384 and SHA-512 file hashes directly in your browser.">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
line-height:1.1;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
margin-bottom:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

select,
input,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:white;
}
select:focus,
input:focus,
textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}
textarea{
min-height:120px;
resize:vertical;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
margin-top:14px;
}

button:hover{
background:#b91c1c;
}
.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}
.drop-zone{
border:2px dashed #d1d5db;
border-radius:16px;
padding:30px;
text-align:center;
background:#f9fafb;
cursor:pointer;
margin-top:14px;
}

.drop-zone:hover,
.drop-zone.dragover{
border-color:#dc2626;
background:#fff5f5;
}

.file-count{
margin-top:12px;
font-size:14px;
font-weight:700;
color:#374151;
}

.result-box{
display:none;
margin-top:20px;
padding:20px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
line-height:1.9;
word-break:break-all;
overflow-wrap:anywhere;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.error{color:#dc2626;}
.success{color:#047857;}
.loading{color:#4b5563;}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}
.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

.toast-info{
background:#111827 !important;
}
@media(max-width:768px){
body{padding:24px 14px;}
.logo img{width:150px;}
.card{padding:20px;}
button{width:100%;}
}
code{
display:block;
margin-top:8px;
padding:12px;
background:#ffffff;
border:1px solid #e5e7eb;
border-radius:8px;
font-size:13px;
font-family:monospace;
word-break:break-all;
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>File Hash Checker</h1>

<p class="subtitle">
Generate and verify file hashes directly in your browser.
</p>

<div class="card">

<h2>Hash Generator</h2>

<p class="subtitle">
Upload a file and generate its SHA-256 hash.
</p>

<div class="drop-zone" id="dropZone">
Click or drag a file here
</div>

<input type="file" id="fileInput" hidden>

<div id="fileCount" class="file-count">No file selected</div>
<label for="hashAlgorithm">Hash Algorithm</label>

<select id="hashAlgorithm">
<option value="SHA-256">SHA-256</option>
<option value="SHA-384">SHA-384</option>
<option value="SHA-512">SHA-512</option>
</select>
<div class="button-group">

<button onclick="generateHash()">
Generate Hash
</button>

<button onclick="clearAll()">
Clear
</button>

</div>

<label for="expectedHash">Expected Hash / Checksum</label>
<textarea id="expectedHash" placeholder="Paste the expected hash here to verify the file..."></textarea>

<div id="message" class="message"></div>
<div id="resultBox" class="result-box"></div>

</div>

</div>

<div style="
text-align:center;
color:#6b7280;
font-size:13px;
margin-top:28px;
">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("fileInput");
const fileCount=document.getElementById("fileCount");
const message=document.getElementById("message");
const resultBox=document.getElementById("resultBox");
const toast=document.getElementById("toast");

dropZone.addEventListener("click",function(){
fileInput.click();
});

dropZone.addEventListener("dragover",function(e){
e.preventDefault();
dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave",function(){
dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop",function(e){
e.preventDefault();
dropZone.classList.remove("dragover");
fileInput.files=e.dataTransfer.files;
updateFileCount();
});

fileInput.addEventListener("change",function(){
updateFileCount();
});

function updateFileCount(){

const file=fileInput.files[0];

fileCount.textContent=file
? file.name + " • " + (file.size/1024/1024).toFixed(2) + " MB"
: "No file selected";

}

function showToast(text,type="info"){

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}

function setMessage(text,type){

message.textContent=text;
message.className="message " + type;

}

function clearAll(){

fileInput.value="";
fileCount.textContent="No file selected";
document.getElementById("expectedHash").value="";
message.textContent="";
message.className="message";

resultBox.innerHTML="";
resultBox.style.display="none";

}

function copyText(text){

if(!text){
showToast("Nothing to copy.");
return;
}

navigator.clipboard.writeText(text);
showToast("Copied.","success");

}

async function generateHash(){

const file=fileInput.files[0];

if(!file){
setMessage("Please select a file.","error");
return;
}

try{

setMessage(
"Generating " + algorithm + " hash...",
"loading"
);

const buffer=await file.arrayBuffer();

const algorithm=document.getElementById("hashAlgorithm").value;

const hashBuffer=await crypto.subtle.digest(
algorithm,
buffer
);

const hashArray=Array.from(new Uint8Array(hashBuffer));

const hashHex=hashArray
.map(byte=>byte.toString(16).padStart(2,"0"))
.join("");
const fileSize=(file.size/1024/1024).toFixed(2) + " MB";
const generatedAt=new Date().toLocaleString();
const expectedHash=document.getElementById("expectedHash").value.trim().toLowerCase();

let verificationHtml="";

if(expectedHash){

if(expectedHash===hashHex.toLowerCase()){
verificationHtml=
"<strong>Verification</strong><br>" +
'<span style="color:#047857;font-weight:700;">Match</span><br><br>';
}else{
verificationHtml=
"<strong>Verification</strong><br>" +
'<span style="color:#dc2626;font-weight:700;">No Match</span><br><br>';
}

}

resultBox.style.display="block";

resultBox.innerHTML=
"<strong>File</strong><br>" +
file.name +
"<br><br>" +
"<strong>Size</strong><br>" +
fileSize +
"<br><br>" +
"<strong>Algorithm</strong><br>" +
algorithm +
"<br><br>" +
"<strong>Generated</strong><br>" +
generatedAt +
"<br><br>" +
verificationHtml +
"<strong>Length</strong><br>" +
hashHex.length +
" characters<br><br>" +
"<strong>Hash</strong><br><code>" +
hashHex +
"</code>" +
"<br><br>" +
'<button style="width:auto;margin-top:12px;" onclick="copyText(\'' + hashHex + '\')">Copy Hash</button>';
setMessage("Hash generated successfully.","success");

}catch(error){

console.error(error);
setMessage("Unable to generate hash.","error");

}

}

</script>

</body>
</html>
