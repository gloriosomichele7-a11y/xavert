<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | QR Code Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:800px;
margin:auto;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:30px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:16px;
padding:25px;
box-shadow:0 6px 16px rgba(0,0,0,.04);
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:16px;
margin-bottom:10px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:700;
margin-top:12px;
}

button:hover{
background:#b91c1c;
}

#qrcode{
margin-top:30px;
text-align:center;
}

.download-buttons{
display:none;
text-align:center;
margin-top:20px;
}

.download-buttons button{
margin:6px;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

canvas{
margin:auto;
}

#error-message{
color:#dc2626;
font-size:14px;
margin-top:8px;
font-weight:500;
}

#detected-type{
color:#4b5563;
font-size:14px;
margin-top:8px;
font-weight:600;
}

.input-error{
border:2px solid #dc2626 !important;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
font-size:14px;
display:none;
z-index:9999;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo.png" alt="XAVERT">
</div>

<h1>QR Code Generator</h1>

<p class="subtitle">
Generate QR codes instantly for links, text, email addresses and more.
</p>

<div class="card">

<label>Enter text or URL</label>

<input
type="text"
id="qrInput"
placeholder="Enter URL, text, email, phone number...">

<div id="error-message"></div>
<div id="detected-type"></div>

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

<div class="download-buttons" id="downloadButtons">
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPNGHD()">Download PNG HD</button>
<button onclick="downloadSVG()">Download SVG</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="copyQR()">Copy QR Image</button>
</div>

</div>

</div>

<div id="toast">
QR image copied to clipboard.
</div>

<script>
const qrInput=document.getElementById("qrInput");
const errorMessage=document.getElementById("error-message");
const detectedType=document.getElementById("detected-type");
const toast=document.getElementById("toast");

qrInput.addEventListener("input",function(){
errorMessage.textContent="";
qrInput.classList.remove("input-error");
detectedType.textContent=detectType(qrInput.value);
});

qrInput.addEventListener("keydown",function(e){
if(e.key==="Enter"){
generateQR();
}
});

function detectType(value){
const input=value.trim();

if(!input){
return "";
}

if(input.startsWith("http://") || input.startsWith("https://")){
return "Detected type: Website URL";
}

if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input)){
return "Detected type: Email Address";
}

if(/^\+?[0-9\s\-()]{7,}$/.test(input)){
return "Detected type: Phone Number";
}

return "Detected type: Text";
}

function getFileName(){
let fileName=qrInput.value
.toLowerCase()
.replace("https://","")
.replace("http://","")
.replace("www.","")
.replace(/[^a-z0-9]/g,"-")
.replace(/-+/g,"-")
.replace(/^-|-$/g,"");

return fileName || "xavert-qr-code";
}

function generateQR(){
const input=qrInput.value;

if(!input.trim()){
errorMessage.textContent="Please enter a URL, text, email or phone number.";
qrInput.classList.add("input-error");
detectedType.textContent="";
return;
}

errorMessage.textContent="";
qrInput.classList.remove("input-error");
detectedType.textContent=detectType(input);

const qrDiv=document.getElementById("qrcode");
qrDiv.innerHTML="";

QRCode.toCanvas(input,{width:350},function(error,canvas){
if(error){
console.error(error);
return;
}

qrDiv.appendChild(canvas);
document.getElementById("downloadButtons").style.display="block";
});
}

function downloadPNG(){
const canvas=document.querySelector("#qrcode canvas");
if(!canvas) return;

const link=document.createElement("a");
link.download="QR-" + getFileName() + ".png";
link.href=canvas.toDataURL("image/png");
link.click();
}

function downloadPNGHD(){
const input=qrInput.value;
if(!input.trim()) return;

QRCode.toCanvas(input,{width:2000},function(error,canvas){
if(error){
console.error(error);
return;
}

const link=document.createElement("a");
link.download="QR-" + getFileName() + "-HD.png";
link.href=canvas.toDataURL("image/png");
link.click();
});
}

function downloadSVG(){
const input=qrInput.value;
if(!input.trim()) return;

QRCode.toString(input,{type:"svg",width:350},function(error,svg){
if(error){
console.error(error);
return;
}

const blob=new Blob([svg],{type:"image/svg+xml"});
const link=document.createElement("a");

link.download="QR-" + getFileName() + ".svg";
link.href=URL.createObjectURL(blob);
link.click();

URL.revokeObjectURL(link.href);
});
}

function downloadPDF(){
const input=qrInput.value;
if(!input.trim()) return;

QRCode.toCanvas(input,{width:2000},function(error,canvas){
if(error){
console.error(error);
return;
}

const { jsPDF } = window.jspdf;
const pdf=new jsPDF();

const imgData=canvas.toDataURL("image/png");

pdf.setFontSize(18);
pdf.text("XAVERT QR Code",105,25,{align:"center"});
pdf.addImage(imgData,"PNG",45,40,120,120);

pdf.save("QR-" + getFileName() + ".pdf");
});
}

async function copyQR(){
const canvas=document.querySelector("#qrcode canvas");
if(!canvas) return;

canvas.toBlob(async function(blob){
try{
await navigator.clipboard.write([
new ClipboardItem({"image/png":blob})
]);

toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
},2000);

}catch(error){
alert("Copy is not supported by this browser.");
}
});
}
</script>

</body>
</html>
