<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | QR Code Generator</title>

<meta name="description" content="Create QR codes for URLs, text, email, phone numbers, SMS, Wi-Fi networks, contacts and events directly in your browser.">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:850px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:#ffffff;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

select,
input,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:#ffffff;
}

textarea{
min-height:110px;
resize:vertical;
}
select:focus,
input:focus,
textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}
.form-section{
display:none;
}

.form-section.active{
display:block;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
margin-top:14px;
}

button:hover{
background:#b91c1c;
}
.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}
#error-message{
color:#dc2626;
font-size:14px;
margin-top:10px;
font-weight:600;
}

#detected-type{
color:#4b5563;
font-size:14px;
margin-top:10px;
font-weight:700;
}

.input-error{
border:2px solid #dc2626 !important;
}

#qrcode{
margin-top:30px;
text-align:center;
}

canvas{
margin:auto;
}

.download-buttons{
display:none;
text-align:center;
margin-top:22px;
}

.download-buttons button{
margin:6px;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
font-size:14px;
display:none;
z-index:9999;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

@media(max-width:768px){
body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

.download-buttons button{
width:100%;
margin:6px 0;
}
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>QR Code Generator</h1>

<p class="subtitle">
Create QR codes for websites, text, email, phone numbers, SMS, Wi-Fi networks, contacts and events.
</p>

<div class="card">

<label for="qrType">QR Type</label>
<select id="qrType">
<option value="text">Text / URL</option>
<option value="email">Email</option>
<option value="phone">Phone</option>
<option value="sms">SMS</option>
<option value="wifi">Wi-Fi</option>
<option value="contact">Contact / vCard</option>
<option value="event">Event</option>
</select>

<div id="section-text" class="form-section active">
<label for="textInput">Text or URL</label>
<textarea id="textInput" placeholder="Enter URL, text, or any content..."></textarea>
</div>

<div id="section-email" class="form-section">
<label for="emailInput">Email Address</label>
<input id="emailInput" type="email" placeholder="name@example.com">

<label for="emailSubject">Subject</label>
<input id="emailSubject" type="text" placeholder="Optional subject">

<label for="emailBody">Message</label>
<textarea id="emailBody" placeholder="Optional message"></textarea>
</div>

<div id="section-phone" class="form-section">
<label for="phoneInput">Phone Number</label>
<input id="phoneInput" type="text" placeholder="+393331234567">
</div>

<div id="section-sms" class="form-section">
<label for="smsPhone">Phone Number</label>
<input id="smsPhone" type="text" placeholder="+393331234567">

<label for="smsMessage">SMS Message</label>
<textarea id="smsMessage" placeholder="Optional SMS message"></textarea>
</div>

<div id="section-wifi" class="form-section">
<label for="wifiSsid">Network Name / SSID</label>
<input id="wifiSsid" type="text" placeholder="Wi-Fi network name">

<label for="wifiPassword">Password</label>
<input id="wifiPassword" type="text" placeholder="Wi-Fi password">

<label for="wifiSecurity">Security Type</label>
<select id="wifiSecurity">
<option value="WPA">WPA/WPA2</option>
<option value="WEP">WEP</option>
<option value="nopass">No Password</option>
</select>
</div>

<div id="section-contact" class="form-section">
<label for="contactName">Full Name</label>
<input id="contactName" type="text" placeholder="John Doe">

<label for="contactPhone">Phone</label>
<input id="contactPhone" type="text" placeholder="+393331234567">

<label for="contactEmail">Email</label>
<input id="contactEmail" type="email" placeholder="name@example.com">

<label for="contactWebsite">Website</label>
<input id="contactWebsite" type="text" placeholder="https://example.com">
</div>

<div id="section-event" class="form-section">
<label for="eventTitle">Event Title</label>
<input id="eventTitle" type="text" placeholder="Meeting, appointment, conference...">

<label for="eventStart">Start Date & Time</label>
<input id="eventStart" type="datetime-local">

<label for="eventEnd">End Date & Time</label>
<input id="eventEnd" type="datetime-local">

<label for="eventLocation">Location</label>
<input id="eventLocation" type="text" placeholder="Event location">
</div>

<div id="error-message"></div>
<div id="detected-type"></div>

<div class="button-group">

<button onclick="generateQR()">
Generate QR Code
</button>

<button onclick="clearQRTool()">
Clear
</button>

</div>

<div id="qrcode"></div>

<div id="qrStats" style="display:none;text-align:center;margin-top:14px;color:#6b7280;font-size:14px;line-height:1.6;">
QR Type: -<br>
Characters: 0<br>
Error Correction: H
</div>

<div class="download-buttons" id="downloadButtons">
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPNGHD()">Download PNG HD</button>
<button onclick="downloadSVG()">Download SVG</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="downloadPDFHD()">Download PDF HD</button>
<button onclick="copyQR()">Copy QR Image</button>
</div>

</div>
</div>

<div id="toast">QR image copied to clipboard.</div>

<script>
const qrType=document.getElementById("qrType");
const errorMessage=document.getElementById("error-message");
const detectedType=document.getElementById("detected-type");
const downloadButtons=document.getElementById("downloadButtons");
const toast=document.getElementById("toast");
const qrStats=document.getElementById("qrStats");
let currentQRData="";

const sections={
text:document.getElementById("section-text"),
email:document.getElementById("section-email"),
phone:document.getElementById("section-phone"),
sms:document.getElementById("section-sms"),
wifi:document.getElementById("section-wifi"),
contact:document.getElementById("section-contact"),
event:document.getElementById("section-event")
};

qrType.addEventListener("change",function(){
Object.values(sections).forEach(section=>section.classList.remove("active"));
sections[qrType.value].classList.add("active");
resetOutput();
});

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){

generateQR();

}

});
document.querySelectorAll("input, textarea, select").forEach(element=>{
element.addEventListener("input",function(){
clearError();
});
});

function clearError(){
errorMessage.textContent="";
document.querySelectorAll(".input-error").forEach(el=>el.classList.remove("input-error"));
}

function resetOutput(){
clearError();
detectedType.textContent="";
document.getElementById("qrcode").innerHTML="";
downloadButtons.style.display="none";
qrStats.style.display="none";
qrStats.innerHTML="QR Type: -<br>Characters: 0<br>Error Correction: H";
currentQRData="";
}
function clearQRTool(){
document.querySelectorAll("input, textarea").forEach(element=>{
element.value="";
});

qrType.value="text";

Object.values(sections).forEach(section=>{
section.classList.remove("active");
});

sections.text.classList.add("active");

resetOutput();
}
function showToast(message){
toast.textContent=message;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
},2200);
}

function setError(message,element){
errorMessage.textContent=message;
if(element){
element.classList.add("input-error");
}
}

function escapeWifi(value){
return value.replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/:/g,"\\:");
}

function formatDateForCalendar(value){
if(!value) return "";
return value.replace(/[-:]/g,"").replace("T","") + "00";
}

function detectType(value){
const input=value.trim();

if(!input) return "";

if(input.startsWith("WIFI:")) return "Detected type: Wi-Fi Network";
if(input.startsWith("BEGIN:VCARD")) return "Detected type: Contact vCard";
if(input.startsWith("BEGIN:VCALENDAR") || input.startsWith("BEGIN:VEVENT")) return "Detected type: Calendar Event";
if(input.startsWith("mailto:")) return "Detected type: Email Address";
if(input.startsWith("tel:")) return "Detected type: Phone Number";
if(input.startsWith("sms:")) return "Detected type: SMS";
if(input.startsWith("http://") || input.startsWith("https://")) return "Detected type: Website URL";
if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input)) return "Detected type: Email Address";
if(/^\+?[0-9\s\-()]{7,}$/.test(input)) return "Detected type: Phone Number";

return "Detected type: Text";
}

function buildQRData(){
const type=qrType.value;

if(type==="text"){
const input=document.getElementById("textInput");
let value=input.value.trim();

if(!value){
setError("Please enter a URL, text or content.",input);
return null;
}

const looksLikeDomain=
/^[a-z0-9-]+(\.[a-z0-9-]+)+([\/?#].*)?$/i.test(value);

if(looksLikeDomain && !value.startsWith("http://") && !value.startsWith("https://")){
value="https://" + value;
}

return value;
}

if(type==="email"){
const email=document.getElementById("emailInput");
const subject=document.getElementById("emailSubject").value.trim();
const body=document.getElementById("emailBody").value.trim();

if(!email.value.trim()){
setError("Please enter an email address.",email);
return null;
}

return "mailto:" + email.value.trim()
+ "?subject=" + encodeURIComponent(subject)
+ "&body=" + encodeURIComponent(body);
}

if(type==="phone"){
const phone=document.getElementById("phoneInput");

if(!phone.value.trim()){
setError("Please enter a phone number.",phone);
return null;
}

return "tel:" + phone.value.trim();
}

if(type==="sms"){
const phone=document.getElementById("smsPhone");
const message=document.getElementById("smsMessage").value.trim();

if(!phone.value.trim()){
setError("Please enter a phone number.",phone);
return null;
}

return "sms:" + phone.value.trim() + "?body=" + encodeURIComponent(message);
}

if(type==="wifi"){
const ssid=document.getElementById("wifiSsid");
const password=document.getElementById("wifiPassword").value.trim();
const security=document.getElementById("wifiSecurity").value;
if(security!=="nopass" && !password){
setError(
"Please enter the Wi-Fi password.",
document.getElementById("wifiPassword")
);
return null;
}
if(!ssid.value.trim()){
setError("Please enter the Wi-Fi network name.",ssid);
return null;
}

return "WIFI:T:" + security + ";S:" + escapeWifi(ssid.value.trim()) + ";P:" + escapeWifi(password) + ";;";
}

if(type==="contact"){
const name=document.getElementById("contactName");
const phone=document.getElementById("contactPhone").value.trim();
const email=document.getElementById("contactEmail").value.trim();
const website=document.getElementById("contactWebsite").value.trim();

if(!name.value.trim()){
setError("Please enter the contact name.",name);
return null;
}

return [
"BEGIN:VCARD",
"VERSION:3.0",
"FN:" + name.value.trim(),
phone ? "TEL:" + phone : "",
email ? "EMAIL:" + email : "",
website ? "URL:" + website : "",
"END:VCARD"
].filter(Boolean).join("\n");
}

if(type==="event"){
const title=document.getElementById("eventTitle");
const start=document.getElementById("eventStart");
const end=document.getElementById("eventEnd");
const location=document.getElementById("eventLocation").value.trim();

if(!title.value.trim()){
setError("Please enter the event title.",title);
return null;
}

if(!start.value){
setError("Please enter the event start date and time.",start);
return null;
}

if(!end.value){
setError("Please enter the event end date and time.",end);
return null;
}

if(new Date(end.value) <= new Date(start.value)){
setError(
"End date and time must be later than the start date and time.",
end
);
return null;
}

return [
"BEGIN:VCALENDAR",
"VERSION:2.0",
"PRODID:-//XAVERT//QR Event//EN",
"UID:" + Date.now() + "@xavert.app",
"BEGIN:VEVENT",
"SUMMARY:" + title.value.trim(),
"DTSTART:" + formatDateForCalendar(start.value),
"DTEND:" + formatDateForCalendar(end.value),
location ? "LOCATION:" + location : "",
"END:VEVENT",
"END:VCALENDAR"
].filter(Boolean).join("\n");
}

return null;
}

function getFileName(){
let base="xavert-qr-code";

if(qrType.value==="text"){
base=document.getElementById("textInput").value;
}

if(qrType.value==="email"){
base=document.getElementById("emailInput").value;
}

if(qrType.value==="phone"){
base=document.getElementById("phoneInput").value;
}

if(qrType.value==="sms"){
base=document.getElementById("smsPhone").value;
}

if(qrType.value==="wifi"){
base=document.getElementById("wifiSsid").value;
}

if(qrType.value==="contact"){
base=document.getElementById("contactName").value;
}

if(qrType.value==="event"){
base=document.getElementById("eventTitle").value;
}

let fileName=base
.toLowerCase()
.replace("https://","")
.replace("http://","")
.replace("www.","")
.replace(/[^a-z0-9]/g,"-")
.replace(/-+/g,"-")
.replace(/^-|-$/g,"");

return fileName || "xavert-qr-code";
}

function generateQR(){
clearError();

const data=buildQRData();

if(!data) return;

currentQRData=data;

const qrDiv=document.getElementById("qrcode");
qrDiv.innerHTML="";

QRCode.toCanvas(data,{width:350,errorCorrectionLevel:"H"},function(error,canvas){
if(error){
console.error(error);
setError("Unable to generate QR code. Please try again.");
return;
}

qrDiv.appendChild(canvas);

const detected=detectType(data);

detectedType.textContent=detected;

qrStats.innerHTML=
detected.replace("Detected type: ","QR Type: ") +
"<br>Characters: " + data.length +
"<br>Error Correction: H";

qrStats.style.display="block";

downloadButtons.style.display="block";
});
}

function downloadPNG(){
const canvas=document.querySelector("#qrcode canvas");
if(!canvas) return;

const link=document.createElement("a");
link.download="QR-" + getFileName() + ".png";
link.href=canvas.toDataURL("image/png");
link.click();

showToast("Download started.");
}

function downloadPNGHD(){
if(!currentQRData) return;

QRCode.toCanvas(currentQRData,{width:2000,errorCorrectionLevel:"H"},function(error,canvas){
if(error){
console.error(error);
return;
}

const link=document.createElement("a");
link.download="QR-" + getFileName() + "-HD.png";
link.href=canvas.toDataURL("image/png");
link.click();
showToast("Download started.");
});
}

function downloadSVG(){
if(!currentQRData){
showToast("Generate a QR code first.");
return;
}

QRCode.toString(currentQRData,{type:"svg",width:350,errorCorrectionLevel:"H"},function(error,svg){
if(error){
console.error(error);
return;
}

const blob=new Blob([svg],{type:"image/svg+xml"});
const link=document.createElement("a");

link.download="QR-" + getFileName() + ".svg";
link.href=URL.createObjectURL(blob);
link.click();

URL.revokeObjectURL(link.href);

showToast("Download started.");
});
}

function createPDF(size){
if(!currentQRData){
showToast("Generate a QR code first.");
return;
}

const qrSize=size==="hd" ? 3000 : 1600;
const fileSuffix=size==="hd" ? "-HD" : "";

QRCode.toCanvas(currentQRData,{width:qrSize,errorCorrectionLevel:"H"},function(error,canvas){
if(error){
console.error(error);
return;
}

const { jsPDF } = window.jspdf;
const pdf=new jsPDF();

const imgData=canvas.toDataURL("image/png");

pdf.setFontSize(18);
pdf.text("XAVERT QR Code",105,24,{align:"center"});

pdf.addImage(imgData,"PNG",45,38,120,120);

pdf.setFontSize(10);
pdf.text("Generated by XAVERT",105,172,{align:"center"});

pdf.save("QR-" + getFileName() + fileSuffix + ".pdf");
showToast("Download started.");
});
}

function downloadPDF(){
createPDF("standard");
}

function downloadPDFHD(){
createPDF("hd");
}

async function copyQR(){

const canvas=document.querySelector("#qrcode canvas");

if(!canvas){
showToast("Generate a QR code first.");
return;
}

canvas.toBlob(async function(blob){
try{
await navigator.clipboard.write([
new ClipboardItem({"image/png":blob})
]);

showToast("QR image copied to clipboard.");
}catch(error){
showToast("Copy is not supported by this browser.");
}
});
}
</script>

</body>
</html>
