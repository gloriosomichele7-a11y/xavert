<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | QR Code Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:800px;
margin:auto;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:30px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:16px;
padding:25px;
box-shadow:0 6px 16px rgba(0,0,0,.04);
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

#qrcode{
margin-top:30px;
text-align:center;
}

#downloadPngBtn,
#downloadSvgBtn,
#downloadPdfBtn{
display:none;
margin:20px auto 0;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

canvas{
margin:auto;
}
#error-message{
color:#dc2626;
font-size:14px;
margin-top:8px;
font-weight:500;
}

.input-error{
border:2px solid #dc2626 !important;
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">
← Back to Home
</a>

<div class="logo">
<img src="../logo.png" alt="XAVERT">
</div>

<h1>QR Code Generator</h1>

<p class="subtitle">
Generate QR codes instantly for links, text, email addresses and more.
</p>

<div class="card">

<label>Enter text or URL</label>

<input
type="text"
id="qrInput"
placeholder="Enter URL, text, email, phone number...">
<div id="error-message"></div>
<button onclick="generateQR()">
Generate QR Code
</button>

<div id="qrcode"></div>

<button id="downloadPngBtn" onclick="downloadPNG()">
Download PNG
</button>
<button id="downloadSvgBtn" onclick="downloadSVG()">
Download SVG
</button>

<button id="downloadPdfBtn" onclick="downloadPDF()">
Download PDF
</button>
</div>
</div>

<script>

function generateQR(){

const input = document.getElementById("qrInput").value;

const errorMessage=document.getElementById("error-message");
const qrInput=document.getElementById("qrInput");
qrInput.addEventListener("input",function(){

errorMessage.textContent="";

qrInput.classList.remove("input-error");

});
if(!input.trim()){
errorMessage.textContent="Please enter a URL, text, email or phone number.";
qrInput.classList.add("input-error");
return;
}

errorMessage.textContent="";
qrInput.classList.remove("input-error");

const qrDiv = document.getElementById("qrcode");

qrDiv.innerHTML = "";

QRCode.toCanvas(input,{
width:350
},function(error,canvas){

if(error){
console.error(error);
return;
}

qrDiv.appendChild(canvas);

document.getElementById("downloadPngBtn").style.display="block";
document.getElementById("downloadSvgBtn").style.display="block";
document.getElementById("downloadPdfBtn").style.display="block";

});

}

function downloadPNG(){

const canvas=document.querySelector("#qrcode canvas");

if(!canvas) return;

const link=document.createElement("a");

let fileName = document.getElementById("qrInput").value
.toLowerCase()
.replace("https://","")
.replace("http://","")
.replace("www.","")
.replace(/[^a-z0-9]/g,"-")
.replace(/-+/g,"-")
.replace(/^-|-$/g,"");

if(!fileName){
fileName="xavert-qr-code";
}

link.download="QR-" + fileName + ".png";

link.href=canvas.toDataURL();

link.click();

}
link.click();

}

function downloadSVG(){

const input=document.getElementById("qrInput").value;

if(!input.trim()) return;

QRCode.toString(input,{type:"svg",width:350},function(error,svg){

if(error){
console.error(error);
return;
}

let fileName=input
.toLowerCase()
.replace("https://","")
.replace("http://","")
.replace("www.","")
.replace(/[^a-z0-9]/g,"-")
.replace(/-+/g,"-")
.replace(/^-|-$/g,"");

if(!fileName){
fileName="xavert-qr-code";
}

const blob=new Blob([svg],{type:"image/svg+xml"});
const link=document.createElement("a");

link.download="QR-" + fileName + ".svg";
link.href=URL.createObjectURL(blob);
link.click();

URL.revokeObjectURL(link.href);

});

}

</script>
</script>

</body>
</html>
