<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | Lorem Ipsum Generator</title>

<meta name="description" content="Free online Lorem Ipsum Generator to create placeholder text for websites, apps, layouts and design projects directly in your browser. Generate words, sentences and paragraphs instantly.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://xavert.com/tools/lorem-ipsum-generator.html">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

select,
input,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:white;
}

textarea{
min-height:320px;
resize:vertical;
line-height:1.7;
}

select:focus,
input:focus,
textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:16px;
}

.stat-box{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
text-align:center;
}

.stat-box strong{
display:block;
font-size:20px;
margin-bottom:4px;
}

.stat-box span{
font-size:13px;
color:#6b7280;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.success{
color:#047857;
}

.error{
color:#dc2626;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}

.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

h1{
font-size:34px;
}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>Lorem Ipsum Generator</h1>

<p class="subtitle">
Generate placeholder text for websites, applications, layouts and design projects.
</p>

<div class="card">

<div class="grid">

<div>

<label>Generation Type</label>

<select id="type">
<option value="paragraphs">Paragraphs</option>
<option value="sentences">Sentences</option>
<option value="words">Words</option>
</select>

<label>Quantity</label>

<input
id="quantity"
type="number"
min="1"
max="100"
value="5"
>

<label>
<input
type="checkbox"
id="startLorem"
checked
style="width:auto;margin-right:8px;"
>
Start with "Lorem ipsum"
</label>

<div class="button-group">
<button onclick="generateLorem()">Generate Text</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="message" class="message"></div>

</div>

<div>
<div style="margin-bottom:10px;font-size:13px;color:#6b7280;">
<a href="#" onclick="loadSampleLorem();return false;">Load Sample</a>
</div>
<label>Generated Text</label>

<textarea
id="output"
readonly
placeholder="Generated Lorem Ipsum text will appear here..."
></textarea>

<div class="button-group">
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadOutput()">Download TXT</button>
</div>

<div class="stats">

<div class="stat-box">
<strong id="wordCount">0</strong>
<span>Words</span>
</div>

<div class="stat-box">
<strong id="charCount">0</strong>
<span>Characters</span>
</div>

<div class="stat-box">
<strong id="paragraphCount">0</strong>
<span>Paragraphs</span>
</div>

</div>

</div>

</div>

</div>

</div>

<div style="
text-align:center;
color:#6b7280;
font-size:13px;
margin-top:28px;
">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const loremWords=`lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum`.split(" ");

const toast=document.getElementById("toast");

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){
generateLorem();
}

});

function showToast(text,type="success"){

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}

function setMessage(text,type){

const message=document.getElementById("message");

message.textContent=text;
message.className="message " + type;

}

function randomWord(){

return loremWords[
Math.floor(Math.random()*loremWords.length)
];

}

function createSentence(){

let length=Math.floor(Math.random()*10)+8;

let words=[];

for(let i=0;i<length;i++){
words.push(randomWord());
}

let sentence=words.join(" ");

sentence=
sentence.charAt(0).toUpperCase() +
sentence.slice(1);

return sentence + ".";

}

function createParagraph(){

let sentences=[];

let count=Math.floor(Math.random()*4)+4;

for(let i=0;i<count;i++){
sentences.push(createSentence());
}

return sentences.join(" ");

}
function loadSampleLorem(){

document.getElementById("type").value="paragraphs";
document.getElementById("quantity").value="3";
document.getElementById("startLorem").checked=true;

generateLorem();

showToast("Sample generated");

}
function generateLorem(){

const type=document.getElementById("type").value;
const quantity=parseInt(document.getElementById("quantity").value);

if(!quantity || quantity<1 || quantity>100){

setMessage(
"Quantity must be between 1 and 100.",
"error"
);

return;

}

let result="";

if(type==="words"){

let words=[];

for(let i=0;i<quantity;i++){
words.push(randomWord());
}

result=words.join(" ");

}else if(type==="sentences"){

let sentences=[];

for(let i=0;i<quantity;i++){
sentences.push(createSentence());
}

result=sentences.join(" ");

}else{

let paragraphs=[];

for(let i=0;i<quantity;i++){
paragraphs.push(createParagraph());
}

result=paragraphs.join("\n\n");

}

if(document.getElementById("startLorem").checked){

result=
"Lorem ipsum dolor sit amet, consectetur adipiscing elit. " +
result;

}

document.getElementById("output").value=result;

updateStats(result);

setMessage(
"Lorem Ipsum generated successfully.",
"success"
);
showToast("Lorem Ipsum generated");
}

function updateStats(text){

document.getElementById("wordCount").textContent=
text.trim()
? text.trim().split(/\s+/).length
: 0;

document.getElementById("charCount").textContent=
text.length;

const type=document.getElementById("type").value;

document.getElementById("paragraphCount").textContent=
type==="paragraphs"
? (text.trim() ? text.split(/\n\s*\n/).length : 0)
: "-";

}

function copyOutput(){

const text=document.getElementById("output").value;

if(!text){
showToast("Nothing to copy","error");
return;
}

navigator.clipboard.writeText(text);

showToast("Copied");

}

function downloadOutput(){

const text=document.getElementById("output").value;

if(!text){
showToast("Nothing to download","error");
return;
}

const blob=new Blob(
[text],
{
type:"text/plain;charset=utf-8"
}
);

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
const type=document.getElementById("type").value;

link.download=
"xavert-lorem-" + type + ".txt";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started");

}

function clearAll(){

document.getElementById("output").value="";
document.getElementById("quantity").value="5";
document.getElementById("type").value="paragraphs";
document.getElementById("startLorem").checked=true;
document.getElementById("wordCount").textContent="0";
document.getElementById("charCount").textContent="0";
document.getElementById("paragraphCount").textContent="0";

document.getElementById("message").textContent="";
document.getElementById("message").className="message";
showToast("Cleared");
}

</script>

</body>
</html>
