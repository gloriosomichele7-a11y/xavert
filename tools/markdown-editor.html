<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | Markdown Editor</title>

<meta name="description" content="Free online Markdown Editor with live preview, Markdown to HTML conversion, copy tools and file export directly in your browser.">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
line-height:1.1;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
margin-bottom:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

textarea{
width:100%;
min-height:300px;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:white;
resize:vertical;
line-height:1.6;
font-family:monospace;
}

textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
margin-top:14px;
}

button:hover{
background:#b91c1c;
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}

.editor-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.preview-box{
min-height:300px;
padding:18px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
line-height:1.7;
overflow:auto;
}

.preview-box h1{
font-size:32px;
margin:14px 0 8px;
}

.preview-box h2{
font-size:26px;
margin:14px 0 8px;
}

.preview-box h3{
font-size:22px;
margin:14px 0 8px;
}

.preview-box p{
margin:10px 0;
}

.preview-box ul,
.preview-box ol{
margin:10px 0 10px 24px;
}

.preview-box code{
background:#ffffff;
border:1px solid #e5e7eb;
padding:2px 6px;
border-radius:6px;
font-family:monospace;
}

.preview-box pre{
background:#111827;
color:white;
padding:14px;
border-radius:10px;
overflow:auto;
margin:12px 0;
}

.preview-box blockquote{
border-left:4px solid #dc2626;
padding-left:12px;
color:#4b5563;
margin:12px 0;
}

.preview-box a{
color:#dc2626;
font-weight:700;
}
.preview-box table{
width:100%;
border-collapse:collapse;
margin:14px 0;
font-size:14px;
}

.preview-box th,
.preview-box td{
border:1px solid #d1d5db;
padding:10px;
text-align:left;
}

.preview-box th{
background:#f3f4f6;
font-weight:800;
}
.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-top:16px;
}

.stat-box{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
text-align:center;
}

.stat-box strong{
display:block;
font-size:22px;
margin-bottom:4px;
}

.stat-box span{
font-size:13px;
color:#6b7280;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.error{color:#dc2626;}
.success{color:#047857;}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

.toast-info{
background:#111827 !important;
}

@media(max-width:900px){
.editor-grid{
grid-template-columns:1fr;
}
.stats{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:768px){
body{padding:24px 14px;}
.logo img{width:150px;}
.card{padding:20px;}
button{width:100%;}
h1{font-size:34px;}
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>Markdown Editor</h1>

<p class="subtitle">
Write, preview, convert and export Markdown documents directly in your browser.
</p>

<div class="card">

<div class="editor-grid">

<div>
<label for="markdownInput">Markdown Input</label>
<textarea id="markdownInput" placeholder="# Hello XAVERT

Write your Markdown here...

## Features

- Live preview
- Copy Markdown
- Copy HTML
- Download .md
- Download .html"></textarea>

<div class="button-group">
<button onclick="renderMarkdown()">Update Preview</button>
<button onclick="clearAll()">Clear</button>
</div>
</div>

<div>
<label>Live Preview</label>
<div id="previewBox" class="preview-box"></div>

<div class="button-group">
<button onclick="copyMarkdown()">Copy Markdown</button>
<button onclick="copyHtml()">Copy HTML</button>
<button onclick="downloadMarkdown()">Download .md</button>
<button onclick="downloadHtml()">Download .html</button>
</div>
</div>

</div>

<div class="stats">
<div class="stat-box">
<strong id="wordCount">0</strong>
<span>Words</span>
</div>

<div class="stat-box">
<strong id="charCount">0</strong>
<span>Characters</span>
</div>

<div class="stat-box">
<strong id="lineCount">0</strong>
<span>Lines</span>
</div>

<div class="stat-box">
<strong id="headingCount">0</strong>
<span>Headings</span>
</div>

<div class="stat-box">
<strong id="readingTime">0 min</strong>
<span>Reading Time</span>
</div>
</div> 

<div id="message" class="message"></div>

</div>

</div>

<div style="
text-align:center;
color:#6b7280;
font-size:13px;
margin-top:28px;
">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>
const markdownInput=document.getElementById("markdownInput");
const previewBox=document.getElementById("previewBox");
const message=document.getElementById("message");
const toast=document.getElementById("toast");

markdownInput.addEventListener("input",function(){
renderMarkdown(false);
});

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.key==="Enter"){
renderMarkdown(true);
}
});

function showToast(text,type="info"){
toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);
}

function setMessage(text,type){
message.textContent=text;
message.className="message " + type;
}

function escapeHtml(text){
return text
.split("&").join("&amp;")
.split("<").join("&lt;")
.split(">").join("&gt;");
}

function replacePairs(text,marker,openTag,closeTag){

let result="";
let open=false;
let i=0;

while(i<text.length){

if(text.slice(i,i+marker.length)===marker){
result += open ? closeTag : openTag;
open=!open;
i += marker.length;
}else{
result += text[i];
i++;
}

}

if(open){
result += closeTag;
}

return result;

}

function parseLinks(text){

let result="";
let i=0;

while(i<text.length){

let start=text.indexOf("[",i);
let mid=text.indexOf("](",start);
let end=text.indexOf(")",mid);

if(start===-1 || mid===-1 || end===-1){
result += text.slice(i);
break;
}

result += text.slice(i,start);

let label=text.slice(start+1,mid);
let url=text.slice(mid+2,end);

result += '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + label + '</a>';

i=end+1;

}

return result;

}

function isTableSeparator(line){

const trimmed=line.trim();

if(!trimmed.includes("|")){
return false;
}

return trimmed
.split("|")
.filter(cell=>cell.trim() !== "")
.every(cell=>/^:?-{3,}:?$/.test(cell.trim()));

}

function parseTable(lines,startIndex){

let header=lines[startIndex].trim();
let separator=lines[startIndex+1].trim();
let rows=[];
let index=startIndex+2;

if(!header.includes("|") || !isTableSeparator(separator)){
return null;
}

while(index<lines.length && lines[index].includes("|") && lines[index].trim()!==""){
rows.push(lines[index].trim());
index++;
}

function splitRow(row){
return row
.split("|")
.map(cell=>cell.trim())
.filter((cell,pos,array)=>!(cell==="" && (pos===0 || pos===array.length-1)));
}

let headers=splitRow(header);

let html="<table><thead><tr>";

headers.forEach(function(cell){
html+="<th>" + parseInline(cell) + "</th>";
});

html+="</tr></thead><tbody>";

rows.forEach(function(row){
html+="<tr>";
splitRow(row).forEach(function(cell){
html+="<td>" + parseInline(cell) + "</td>";
});
html+="</tr>";
});

html+="</tbody></table>";

return {
html:html,
nextIndex:index
};

}

function parseInline(text){

text=parseLinks(text);
text=replacePairs(text,"`","<code>","</code>");
text=replacePairs(text,"**","<strong>","</strong>");
text=replacePairs(text,"*","<em>","</em>");

return text;

}
function markdownToHtml(markdown){

const lines=markdown.split("\n");
let html="";
let inList=false;
let inCode=false;
let codeBuffer="";

function closeList(){
if(inList){
html += "</ul>";
inList=false;
}
}

for(let i=0;i<lines.length;i++){

let line=escapeHtml(lines[i]);

if(line.trim().startsWith("```")){

if(!inCode){
closeList();
inCode=true;
codeBuffer="";
}else{
html += "<pre><code>" + codeBuffer.trim() + "</code></pre>";
inCode=false;
codeBuffer="";
}

continue;
}

if(inCode){
codeBuffer += line + "\n";
continue;
}

if(line.trim()===""){
closeList();
continue;
}
if(i+1<lines.length && line.includes("|") && isTableSeparator(lines[i+1])){
closeList();

const table=parseTable(lines,i);

if(table){
html += table.html;
i=table.nextIndex-1;
continue;
}
}
if(line.startsWith("# ")){
closeList();
html += "<h1>" + parseInline(line.slice(2)) + "</h1>";
continue;
}

if(line.startsWith("## ")){
closeList();
html += "<h2>" + parseInline(line.slice(3)) + "</h2>";
continue;
}

if(line.startsWith("### ")){
closeList();
html += "<h3>" + parseInline(line.slice(4)) + "</h3>";
continue;
}

if(line.startsWith("#### ")){
closeList();
html += "<h4>" + parseInline(line.slice(5)) + "</h4>";
continue;
}

if(line.startsWith("##### ")){
closeList();
html += "<h5>" + parseInline(line.slice(6)) + "</h5>";
continue;
}

if(line.startsWith("###### ")){
closeList();
html += "<h6>" + parseInline(line.slice(7)) + "</h6>";
continue;
}

if(line.startsWith("> ")){
closeList();
html += "<blockquote>" + parseInline(line.slice(2)) + "</blockquote>";
continue;
}

if(line.startsWith("- ")){
if(!inList){
html += "<ul>";
inList=true;
}

const itemText=line.slice(2);

if(itemText.toLowerCase().startsWith("[x] ")){
html += '<li><input type="checkbox" checked disabled> ' + parseInline(itemText.slice(4)) + "</li>";
}else if(itemText.startsWith("[ ] ")){
html += '<li><input type="checkbox" disabled> ' + parseInline(itemText.slice(4)) + "</li>";
}else{
html += "<li>" + parseInline(itemText) + "</li>";
}

continue;
}

closeList();
html += "<p>" + parseInline(line) + "</p>";

}

closeList();

if(inCode){
html += "<pre><code>" + codeBuffer.trim() + "</code></pre>";
}

return html;

}

function updateStats(text){

const clean=text.trim();
const words=clean ? clean.split(/\s+/).length : 0;
const characters=text.length;
const lines=text ? text.split("\n").length : 0;

let headings=0;
text.split("\n").forEach(function(line){
if(line.startsWith("#")){
headings++;
}
});

document.getElementById("wordCount").textContent=words;
document.getElementById("charCount").textContent=characters;
document.getElementById("lineCount").textContent=lines;
document.getElementById("headingCount").textContent=headings;

const readingTime=Math.max(1,Math.ceil(words/200));
document.getElementById("readingTime").textContent=
words ? readingTime + " min" : "0 min";

}

function renderMarkdown(showMessage=true){

const text=markdownInput.value;
const html=markdownToHtml(text);

previewBox.innerHTML=html || "<p style='color:#6b7280;'>Live preview will appear here.</p>";

updateStats(text);

if(showMessage){
setMessage("Preview updated successfully.","success");
}

}

function copyText(text){

if(!text){
showToast("Nothing to copy.","error");
return;
}

navigator.clipboard.writeText(text);
showToast("Copied.","success");

}

function copyMarkdown(){
copyText(markdownInput.value);
}

function copyHtml(){
copyText(previewBox.innerHTML);
}

function downloadText(text,fileName,type){

if(!text){
showToast("Nothing to download.","error");
return;
}

const blob=new Blob([text],{type:type});
const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download=fileName;

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started.","success");

}

function downloadMarkdown(){
downloadText(markdownInput.value,"xavert-markdown-document.md","text/markdown;charset=utf-8");
}

function downloadHtml(){

const htmlDocument=
"<!DOCTYPE html>\n" +
"<html lang=\"en\">\n" +
"<head>\n" +
"<meta charset=\"UTF-8\">\n" +
"<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n" +
"<title>XAVERT Markdown Export</title>\n" +
"</head>\n" +
"<body>\n" +
previewBox.innerHTML +
"\n</body>\n" +
"</html>";

downloadText(htmlDocument,"xavert-markdown-export.html","text/html;charset=utf-8");

}

function clearAll(){

markdownInput.value="";
previewBox.innerHTML="<p style='color:#6b7280;'>Live preview will appear here.</p>";
message.textContent="";
message.className="message";
updateStats("");

}

renderMarkdown(false);
</script>
  
</body>
</html>
