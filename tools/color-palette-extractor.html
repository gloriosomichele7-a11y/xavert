<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | Color Palette Extractor</title>

<meta name="description" content="Free online Color Palette Extractor to extract dominant colors from images and generate HEX and RGB color palettes directly in your browser. Copy and download palettes instantly.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://xavert.com/tools/color-palette-extractor.html">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:#fff;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.controls{
display:grid;
grid-template-columns:1fr 220px;
gap:20px;
margin-bottom:20px;
}

.dropzone{
border:2px dashed #d1d5db;
border-radius:16px;
padding:30px;
text-align:center;
background:#fafafa;
cursor:pointer;
transition:.25s;
}

.dropzone:hover{
border-color:#dc2626;
}

.dropzone.drag{
border-color:#dc2626;
background:#fef2f2;
}

.preview{
margin-top:20px;
text-align:center;
}

.preview img{
max-width:100%;
max-height:300px;
border-radius:12px;
border:1px solid #e5e7eb;
}

select{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.palette{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:16px;
margin-top:25px;
}

.color-card{
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
overflow:hidden;
}

.color-preview{
height:90px;
}

.color-info{
padding:12px;
}

.color-info div{
margin:6px 0;
font-size:13px;
word-break:break-all;
}

.copy-btn{
width:100%;
margin-top:8px;
padding:10px;
font-size:13px;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}

@media(max-width:768px){

body{
padding:24px 14px;
}

.controls{
grid-template-columns:1fr;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

h1{
font-size:34px;
}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>Color Palette Extractor</h1>

<p class="subtitle">
Extract dominant colors from images and generate beautiful palettes instantly.
</p>

<div class="card">

<div class="controls">

<div>
<div class="dropzone" id="dropzone">
<p><strong>Drop image here</strong></p>
<p>or click to upload</p>
<input type="file" id="fileInput" accept="image/*" hidden>
</div>
</div>

<div>
<label style="display:block;margin-bottom:8px;font-weight:700;">
Palette Size
</label>

<select id="paletteSize">
<option value="5">5 Colors</option>
<option value="8">8 Colors</option>
<option value="10">10 Colors</option>
</select>

<div class="actions">
<button onclick="extractColors()">Extract Palette</button>
</div>
</div>

</div>
<div id="imageInfo" style="display:none;text-align:center;color:#6b7280;font-size:14px;margin-top:16px;">
</div>
<div class="preview">
<img id="previewImage" style="display:none;">
</div>

<div class="actions">
<button onclick="copyPalette()">Copy Palette</button>
<button onclick="downloadTXT()">Download TXT</button>
<button onclick="downloadJSON()">Download JSON</button>
<button onclick="downloadCSS()">Download CSS</button>
<button onclick="downloadASE()">Download ASE</button>
</div>

<div id="palette" class="palette"></div>

</div>

</div>

<canvas id="canvas" hidden></canvas>

<div style="text-align:center;color:#6b7280;font-size:13px;margin-top:28px;">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

let imageLoaded=false;
let extractedColors=[];

const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("fileInput");
const previewImage=document.getElementById("previewImage");
const imageInfo=document.getElementById("imageInfo");
dropzone.addEventListener("click",()=>{
fileInput.click();
});

dropzone.addEventListener("dragover",(e)=>{
e.preventDefault();
dropzone.classList.add("drag");
});

dropzone.addEventListener("dragleave",()=>{
dropzone.classList.remove("drag");
});

dropzone.addEventListener("drop",(e)=>{
e.preventDefault();
dropzone.classList.remove("drag");

const file=e.dataTransfer.files[0];
loadImage(file);
});

fileInput.addEventListener("change",(e)=>{
loadImage(e.target.files[0]);
});

function showToast(text){

const toast=document.getElementById("toast");

toast.textContent=text;
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2200);

}

function loadImage(file){

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

previewImage.onload=function(){

const size=(file.size/(1024*1024)).toFixed(2);

imageInfo.style.display="block";
imageInfo.textContent=
file.name + " • " + size + " MB • " +
previewImage.naturalWidth + "×" + previewImage.naturalHeight + " px";

};

previewImage.src=e.target.result;
previewImage.style.display="block";
imageLoaded=true;
extractedColors=[];
document.getElementById("palette").innerHTML="";

};

reader.readAsDataURL(file);

}
function rgbToHsl(r,g,b){

r/=255;
g/=255;
b/=255;

const max=Math.max(r,g,b);
const min=Math.min(r,g,b);

let h,s,l=(max+min)/2;

if(max===min){

h=0;
s=0;

}else{

const d=max-min;

s=l>0.5
? d/(2-max-min)
: d/(max+min);

switch(max){

case r:
h=(g-b)/d + (g<b ? 6 : 0);
break;

case g:
h=(b-r)/d + 2;
break;

case b:
h=(r-g)/d + 4;
break;

}

h/=6;

}

return {
h:Math.round(h*360),
s:Math.round(s*100),
l:Math.round(l*100)
};

}
function rgbToHex(r,g,b){

return "#" +
[r,g,b]
.map(v=>v.toString(16).padStart(2,"0"))
.join("")
.toUpperCase();

}

function extractColors(){

if(!imageLoaded){

showToast("Upload an image first");
return;

}

const img=previewImage;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.naturalWidth;
canvas.height=img.naturalHeight;

ctx.drawImage(img,0,0);

const data=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
).data;

const buckets={};

for(let i=0;i<data.length;i+=40){

const r=Math.round(data[i]/32)*32;
const g=Math.round(data[i+1]/32)*32;
const b=Math.round(data[i+2]/32)*32;

const key=`${r},${g},${b}`;

buckets[key]=(buckets[key]||0)+1;

}

const size=parseInt(
document.getElementById("paletteSize").value
);

const sorted=Object.entries(buckets)
.sort((a,b)=>b[1]-a[1])
.slice(0,size);
const totalPixels=sorted.reduce(
(sum,item)=>sum+item[1],
0
);
extractedColors=[];

const palette=document.getElementById("palette");
palette.innerHTML="";

sorted.forEach(item=>{

const rgb=item[0]
.split(",")
.map(Number);

const hex=rgbToHex(
rgb[0],
rgb[1],
rgb[2]
);
const hsl=rgbToHsl(
rgb[0],
rgb[1],
rgb[2]
);
const percentage=
((item[1]/totalPixels)*100)
.toFixed(1);
extractedColors.push({
hex,
rgb:`rgb(${rgb.join(", ")})`,
hsl:`hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`,
percentage:percentage + "%"
});

const card=document.createElement("div");
card.className="color-card";

card.innerHTML=`
<div class="color-preview" style="background:${hex}"></div>

<div class="color-info">
<div><strong>${hex}</strong></div>
<div>${percentage}%</div>
<div>rgb(${rgb.join(", ")})</div>
<div>hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div>
<button class="copy-btn">Copy HEX</button>
</div>
`;

card.querySelector("button")
.addEventListener("click",()=>{

navigator.clipboard.writeText(hex);
showToast("Copied");

});

palette.appendChild(card);

});

}
function copyPalette(){

if(!extractedColors.length){
showToast("Generate a palette first");
return;
}

const content=extractedColors
.map(c=>`${c.hex} | ${c.rgb}`)
.join("\n");

navigator.clipboard.writeText(content);

showToast("Palette copied");

}
function downloadTXT(){

if(!extractedColors.length){
showToast("Generate a palette first");
return;
}

const content=extractedColors
.map(c=>`${c.hex} | ${c.rgb}`)
.join("\n");

downloadFile(
content,
"xavert-palette.txt",
"text/plain"
);

}

function downloadJSON(){

if(!extractedColors.length){
showToast("Generate a palette first");
return;
}

downloadFile(
JSON.stringify(extractedColors,null,2),
"xavert-palette.json",
"application/json"
);

}

function downloadCSS(){

if(!extractedColors.length){
showToast("Generate a palette first");
return;
}

const content=
":root {\n" +
extractedColors
.map((c,index)=>"  --color-" + (index+1) + ": " + c.hex + ";")
.join("\n") +
"\n}";

downloadFile(
content,
"xavert-palette.css",
"text/css"
);

}

function downloadASE(){

if(!extractedColors.length){
showToast("Generate a palette first");
return;
}

const content=extractedColors
.map((c,index)=>{
return "Color " + (index+1) + " = " + c.hex;
})
.join("\n");

downloadFile(
content,
"xavert-palette.ase.txt",
"text/plain"
);

}  

function downloadFile(content,name,type){

const blob=new Blob([content],{type});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download=name;

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started");

}

</script>

</body>
</html>
