<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | .ENV Generator</title>

<meta name="description" content="Free online .ENV Generator to create environment configuration files for web applications directly in your browser. Generate, copy and download .env files instantly.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://xavert.com/tools/env-generator.html">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
display:block;
margin:12px 0 6px;
font-weight:700;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
}

textarea{
min-height:320px;
font-family:monospace;
resize:vertical;
}

input:focus,
select:focus,
textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}
.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

.toast-info{
background:#111827 !important;
}

.grid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{

}

button{

}

h1{

}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>.ENV Generator</h1>

<p class="subtitle">
Generate environment configuration files directly in your browser. Nothing is uploaded to a server.
</p>
<div style="
background:#ecfdf5;
border:1px solid #a7f3d0;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
font-size:14px;
font-weight:700;
color:#047857;
">
✓ .ENV files are generated locally in your browser. Nothing is uploaded or stored.
</div>
<div class="card">

<div class="grid">

<div>

<label>Application Name</label>
<input id="appName" placeholder="XAVERT">
<label>Application Key</label>
<input id="appKey" readonly>

<div class="button-group">
<button onclick="generateAppKey()">
Generate APP_KEY
</button>
</div>
<label>Environment</label>
<select id="appEnv">
<option>production</option>
<option>development</option>
<option>local</option>
<option>staging</option>
</select>

<label>Debug Mode</label>
<select id="appDebug">
<option>false</option>
<option>true</option>
</select>

<label>Application URL</label>
<input id="appUrl" placeholder="https://example.com">

<label>Database Host</label>
<input id="dbHost" placeholder="localhost">

<label>Database Port</label>
<input id="dbPort" placeholder="3306">

<label>Database Name</label>
<input id="dbName" placeholder="database_name">

<label>Database User</label>
<input id="dbUser" placeholder="database_user">

<label>Database Password</label>
<input id="dbPassword" placeholder="database_password">

<div class="button-group">
<button onclick="generateDbPassword()">
Generate DB Password
</button>
</div>

<div class="button-group">
<button onclick="clearAll()">Clear</button>
</div>

</div>

<div>

<label>Generated .ENV</label>

<textarea
id="output"
readonly
placeholder=".env file will appear here..."
></textarea>

<div class="button-group">
<button onclick="generateEnv()">Generate .ENV</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadOutput()">Download .env</button>
</div>
</div>

</div>

</div>

</div>

<div style="text-align:center;color:#6b7280;font-size:13px;margin-top:28px;">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const toast=document.getElementById("toast");

function showToast(text,type="info"){

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}
function getSecureRandomChar(chars){

const array=new Uint32Array(1);
crypto.getRandomValues(array);

return chars.charAt(array[0] % chars.length);

}

function generateAppKey(){

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";

let key="base64:";

for(let i=0;i<32;i++){
key+=getSecureRandomChar(chars);
}

document.getElementById("appKey").value=key;

showToast("APP_KEY generated.","success");

}
function generateDbPassword(){

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let password="";

for(let i=0;i<24;i++){
password+=getSecureRandomChar(chars);
}

document.getElementById("dbPassword").value=password;

showToast("Database password generated.","success");

}
function generateEnv(){
if(!document.getElementById("appKey").value){
    generateAppKey();
}
const env=
`APP_NAME="${document.getElementById("appName").value || "XAVERT"}"
APP_ENV=${document.getElementById("appEnv").value}
APP_DEBUG=${document.getElementById("appDebug").value}
APP_URL=${document.getElementById("appUrl").value || "http://localhost"}
APP_KEY=${document.getElementById("appKey").value}

DB_HOST=${document.getElementById("dbHost").value || "localhost"}
DB_PORT=${document.getElementById("dbPort").value || "3306"}
DB_NAME=${document.getElementById("dbName").value || "database"}
DB_USER=${document.getElementById("dbUser").value || "root"}
DB_PASSWORD=${document.getElementById("dbPassword").value}


document.getElementById("output").value=env;

showToast(".ENV generated.","success");

}

function copyOutput(){

const text=document.getElementById("output").value;

if(!text){
showToast("Nothing to copy.","error");
return;
}

navigator.clipboard.writeText(text);

showToast("Copied.","success");

}

function downloadOutput(){

const text=document.getElementById("output").value;

if(!text){
showToast("Nothing to download.","error");
return;
}

const blob=new Blob([text],{
type:"text/plain;charset=utf-8"
});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download=".env";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started.","success");
}

function clearAll(){

document.getElementById("appName").value="";
document.getElementById("appEnv").value="production";
document.getElementById("appDebug").value="false";
document.getElementById("appUrl").value="";

document.getElementById("dbHost").value="";
document.getElementById("dbPort").value="";
document.getElementById("dbName").value="";
document.getElementById("dbUser").value="";
document.getElementById("dbPassword").value="";
document.getElementById("appKey").value="";
document.getElementById("output").value="";

showToast("Cleared.","success");

}
document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){
generateEnv();
}

});

</script>

</body>
</html>
