<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAVERT | Password Toolkit</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
margin-bottom:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

select,
input,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:white;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
margin-top:14px;
}

button:hover{
background:#b91c1c;
}

.tool-section{
display:none;
}

.tool-section.active{
display:block;
}

.info{
color:#4b5563;
font-size:14px;
margin:8px 0 16px;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.error{color:#dc2626;}
.success{color:#047857;}
.loading{color:#4b5563;}

.result-box{
display:none;
margin-top:16px;
padding:14px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
font-size:15px;
color:#374151;
line-height:1.6;
word-break:break-all;
}

.checkbox-row{
display:flex;
align-items:center;
gap:10px;
margin-top:12px;
}

.checkbox-row input{
width:auto;
}

.strength-bar{
height:10px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
margin-top:12px;
}

.strength-fill{
height:100%;
width:0%;
background:#dc2626;
transition:0.2s;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
font-size:14px;
display:none;
z-index:9999;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

@media(max-width:768px){
body{padding:24px 14px;}
.logo img{width:150px;}
.card{padding:20px;}
button{width:100%;}
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo.png" alt="XAVERT">
</div>

<h1>Password Toolkit</h1>

<p class="subtitle">
Generate strong passwords, check password strength and create secure hashes directly in your browser.
</p>

<div class="card">
<label for="toolSelector">Select Tool</label>
<select id="toolSelector">
<option value="generator">Password Generator</option>
<option value="checker">Password Strength Checker</option>
<option value="passphrase">Passphrase Generator</option>
<option value="hash">SHA-256 Hash Generator</option>
</select>
</div>
