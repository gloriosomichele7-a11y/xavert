<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAVERT | Base64 Toolkit</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
line-height:1.1;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
margin-bottom:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

textarea{
width:100%;
min-height:220px;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
background:white;
resize:vertical;
font-family:monospace;
line-height:1.6;
}
.result-box textarea{
background:#f9fafb;
border-color:#dbe3ea;
}
button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
margin-top:14px;
}

button:hover{
background:#b91c1c;
}

.result-box{
display:none;
margin-top:20px;
padding:20px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.error{color:#dc2626;}
.success{color:#047857;}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}

@media(max-width:768px){
body{padding:24px 14px;}
.logo img{width:150px;}
.card{padding:20px;}
button{width:100%;}
}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo.png" alt="XAVERT">
</div>

<h1>Base64 Toolkit</h1>

<p class="subtitle">
Encode and decode Base64 text directly in your browser.
</p>

<div class="card">

<label for="inputText">Input Text</label>
<textarea id="inputText" placeholder="Paste text or Base64 data here"></textarea>

<button onclick="encodeBase64()">Base64 Encode</button>
<button onclick="decodeBase64()">Base64 Decode</button>
<button onclick="clearAll()">Clear</button>

<div id="message" class="message"></div>

<div id="resultBox" class="result-box">

<label id="outputLabel" for="outputText">Output</label>
<textarea id="outputText" readonly></textarea>

<button onclick="copyResult()">Copy Result</button>
<button onclick="downloadResult()">Download Result</button>

</div>

</div>

</div>

<div id="toast"></div>
<script>

const inputText=document.getElementById("inputText");
const outputText=document.getElementById("outputText");
const outputLabel=document.getElementById("outputLabel");
const resultBox=document.getElementById("resultBox");
const message=document.getElementById("message");
const toast=document.getElementById("toast");
let lastAction="result";
function showToast(text){

toast.textContent=text;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
},2200);

}

function setMessage(text,type){

message.textContent=text;
message.className="message " + type;

}

function encodeBase64(){

const text=inputText.value;

if(!text){
setMessage("Please enter text to encode.","error");
return;
}

try{

const encoded=btoa(unescape(encodeURIComponent(text)));

outputText.value=encoded;
lastAction="encoded";
outputLabel.textContent="Encoded Output";
resultBox.style.display="block";

setMessage("Text encoded successfully.","success");

}catch(error){

console.error(error);
setMessage("Unable to encode text.","error");

}

}

function decodeBase64(){

const text=inputText.value.trim();

if(!text){
setMessage("Please enter Base64 data to decode.","error");
return;
}

try{

const decoded=decodeURIComponent(escape(atob(text)));

outputText.value=decoded;
lastAction="decoded";
outputLabel.textContent="Decoded Output";
resultBox.style.display="block";

setMessage("Base64 decoded successfully.","success");

}catch(error){

console.error(error);
setMessage("Invalid Base64 data.","error");

}

}

function copyResult(){

if(!outputText.value){
showToast("Nothing to copy.");
return;
}

navigator.clipboard.writeText(outputText.value);
showToast("Copied.");

}

function downloadResult(){

if(!outputText.value){
showToast("Nothing to download.");
return;
}

const blob=new Blob(
[outputText.value],
{type:"text/plain;charset=utf-8"}
);

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="xavert-base64-" + lastAction + ".txt";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

}

function clearAll(){

inputText.value="";
outputText.value="";
resultBox.style.display="none";
outputLabel.textContent="Output";
lastAction="result";
message.textContent="";
message.className="message";

}

</script>

</body>
</html>
