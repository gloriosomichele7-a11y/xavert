<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>Base64 Toolkit</h1>

<p class="subtitle">
Encode and decode Base64 text directly in your browser.
</p>
<div style="
background:#ecfdf5;
border:1px solid #a7f3d0;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
font-size:14px;
font-weight:700;
color:#047857;
">
✓ All Base64 encoding and decoding is performed locally in your browser. No data is uploaded or stored.
</div>
<div class="card">

<label for="inputText">Input Text</label>
<textarea id="inputText" placeholder="Paste text or Base64 data here"></textarea>
<div id="inputInfo" style="margin-top:8px;color:#6b7280;font-size:13px;">
Characters: 0
</div>
<div id="inputType" style="margin-top:4px;color:#6b7280;font-size:13px;">
Detected: —
</div>
<div class="button-group">

<button onclick="encodeBase64()">
Base64 Encode
</button>

<button onclick="decodeBase64()">
Base64 Decode
</button>

<button onclick="clearAll()">
Clear
</button>

</div>

<div id="message" class="message"></div>

<div id="resultBox" class="result-box">

<label id="outputLabel" for="outputText">Output</label>

<div id="outputInfo" style="margin-bottom:8px;color:#6b7280;font-size:13px;">
Characters: 0
</div>

<textarea id="outputText" readonly></textarea>
<div id="conversionStats" style="margin-top:8px;color:#6b7280;font-size:13px;display:none;">
<div id="utfInfo" style="margin-top:4px;color:#6b7280;font-size:13px;display:none;">
</div>
</div>
<button onclick="copyResult()">Copy Result</button>
<button onclick="downloadResult()">Download Result</button>

</div>

</div>

</div>

<div id="toast"></div>
<script>

const inputText=document.getElementById("inputText");
const inputInfo=document.getElementById("inputInfo");
const inputType=document.getElementById("inputType");
const outputText=document.getElementById("outputText");
const outputLabel=document.getElementById("outputLabel");
const outputInfo=document.getElementById("outputInfo");
const conversionStats=document.getElementById("conversionStats");
const utfInfo=document.getElementById("utfInfo");
const resultBox=document.getElementById("resultBox");
const message=document.getElementById("message");
const toast=document.getElementById("toast");
let lastAction="result";
inputText.addEventListener("input",function(){

const value=inputText.value.trim();

inputInfo.textContent=
"Characters: " + value.length;

if(!value){

inputType.textContent="Detected: —";

}else if(looksLikeBase64(value)){

inputType.textContent="Detected: Possible Base64";

try{

const decoded=decodeURIComponent(
escape(atob(value))
);

outputText.value=decoded;
outputInfo.textContent=
"Characters: " + decoded.length;
const diff=value.length-decoded.length;

conversionStats.style.display="block";
conversionStats.textContent=
"Input: " + value.length +
" • Output: " + decoded.length +
" • Saved: " + diff + " characters";
outputLabel.textContent="Decoded Output";
resultBox.style.display="block";
utfInfo.style.display="block";
utfInfo.textContent="Decoded as UTF-8 text";

}catch(error){

outputText.value="";
resultBox.style.display="none";
utfInfo.style.display="none";
conversionStats.style.display="none";

}

}else{

inputType.textContent="Detected: Plain Text";

}

});
function showToast(text,type="info"){

if(!text){
return;
}

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

clearTimeout(window.toastTimer);

window.toastTimer=setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}

function setMessage(text,type){

message.textContent=text;
message.className="message " + type;

if(type==="error"){
showToast(text,"error");
}

}

function encodeBase64(){

const text=inputText.value;

if(!text){
setMessage("Please enter text to encode.","error");
return;
}

try{

const encoded=btoa(unescape(encodeURIComponent(text)));

outputText.value=encoded;
outputInfo.textContent="Characters: " + encoded.length;
const diff=encoded.length-text.length;
const ratio=((encoded.length/text.length)*100).toFixed(0);

conversionStats.style.display="block";
conversionStats.textContent=
"Input: " + text.length +
" • Output: " + encoded.length +
" • Difference: +" + diff +
" • Size: " + ratio + "%";
lastAction="encoded";
outputLabel.textContent="Encoded Output";
resultBox.style.display="block";

setMessage("Text encoded successfully.","success");
showToast("Text encoded successfully.","success");
}catch(error){

console.error(error);

outputText.value="";
resultBox.style.display="none";

setMessage(
"Unable to encode this text.",
"error"
);

}
}
function looksLikeBase64(value){

if(value.length<8){
return false;
}

value=value.replace(/\s+/g,"");

if(value.length%4!==0){
return false;
}

return /^[A-Za-z0-9+/=\s]+$/.test(value);

}
function decodeBase64(){

const text=inputText.value.trim();

if(!text){
setMessage("Please enter Base64 data to decode.","error");
return;
}

try{

const decoded=decodeURIComponent(escape(atob(text)));

outputText.value=decoded;
outputInfo.textContent="Characters: " + decoded.length;
lastAction="decoded";
outputLabel.textContent="Decoded Output";
resultBox.style.display="block";
utfInfo.style.display="block";
utfInfo.textContent="Decoded as UTF-8 text";

setMessage("Base64 decoded successfully.","success");
showToast("Base64 decoded successfully.","success");
}catch(error){

console.error(error);
setMessage("Invalid Base64 data.","error");
outputText.value="";
resultBox.style.display="none";
}

}

function copyResult(){

if(!outputText.value){
showToast("Nothing to copy.","error");
return;
}

navigator.clipboard.writeText(outputText.value);
showToast("Copied.","success");

}

function downloadResult(){

if(!outputText.value){
showToast("Nothing to download.","error");
return;
}

const blob=new Blob(
[outputText.value],
{type:"text/plain;charset=utf-8"}
);

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="xavert-base64-" + lastAction + ".txt";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);
showToast("Download started.","success");
}

function clearAll(){

inputText.value="";
outputText.value="";
resultBox.style.display="none";
conversionStats.style.display="none";
conversionStats.textContent="";
outputLabel.textContent="Output";
lastAction="result";
outputInfo.textContent="Characters: 0";
utfInfo.style.display="none";
utfInfo.textContent="";
inputInfo.textContent="Characters: 0";
inputType.textContent="Detected: —";
message.textContent="";
message.className="message";
showToast("Cleared.","success");
}

</script>

</body>
