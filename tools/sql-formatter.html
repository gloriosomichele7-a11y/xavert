<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAVERT | SQL Formatter</title>

<meta name="description" content="Format, beautify and organize SQL queries directly in your browser. Improve readability instantly.">

<link rel="icon" href="../favicon.svg" type="image/svg+xml">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
padding:40px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#dc2626;
font-weight:700;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
height:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:28px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:26px;
box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:700;
}

textarea{
width:100%;
min-height:350px;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:14px;
font-family:monospace;
resize:vertical;
line-height:1.6;
}

textarea:focus{
outline:none;
border-color:#dc2626;
box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

.button-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
}

button:hover{
background:#b91c1c;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:20px;
}

.stat-box{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
text-align:center;
}

.stat-box strong{
display:block;
font-size:20px;
margin-bottom:4px;
}

.stat-box span{
font-size:13px;
color:#6b7280;
}

.message{
margin-top:14px;
font-size:14px;
font-weight:600;
}

.success{
color:#047857;
}

.error{
color:#dc2626;
}

#toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}

.toast-success{
background:#047857 !important;
}

.toast-error{
background:#dc2626 !important;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

body{
padding:24px 14px;
}

.logo img{
width:150px;
}

.card{
padding:20px;
}

button{
width:100%;
}

h1{
font-size:34px;
}

.stats{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<div class="container">

<a href="../index.html" class="back">← Back to Home</a>

<div class="logo">
<img src="../logo-hero.svg" alt="XAVERT">
</div>

<h1>SQL Formatter</h1>

<p class="subtitle">
Format and beautify SQL queries directly in your browser.
</p>

<div class="card">

<div class="grid">

<div>

<label>Input SQL</label>

<textarea
id="inputSql"
placeholder="Paste your SQL query here..."
></textarea>

<div class="button-group">
<button onclick="formatSql()">Format SQL</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="message" class="message"></div>

</div>

<div>

<label>Formatted SQL</label>

<textarea
id="outputSql"
readonly
placeholder="Formatted SQL will appear here..."
></textarea>

<div class="button-group">
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadSql()">Download SQL</button>
</div>

</div>

</div>

<div class="stats">

<div class="stat-box">
<strong id="inputChars">0</strong>
<span>Input Chars</span>
</div>

<div class="stat-box">
<strong id="outputChars">0</strong>
<span>Output Chars</span>
</div>

<div class="stat-box">
<strong id="lineCount">0</strong>
<span>Lines</span>
</div>

<div class="stat-box">
<strong id="keywordCount">0</strong>
<span>Keywords</span>
</div>

</div>

</div>

</div>

<div style="text-align:center;color:#6b7280;font-size:13px;margin-top:28px;">
Powered by XAVERT
</div>

<div id="toast"></div>

<script>

const toast=document.getElementById("toast");

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.key==="Enter"){
formatSql();
}
});

function showToast(text,type="success"){

toast.textContent=text;
toast.className="toast-" + type;
toast.style.display="block";

setTimeout(function(){
toast.style.display="none";
toast.className="";
},2200);

}

function setMessage(text,type){

const message=document.getElementById("message");

message.textContent=text;
message.className="message " + type;

}

function formatSql(){

let sql=document.getElementById("inputSql").value;

if(!sql.trim()){
setMessage("Please enter SQL code.","error");
return;
}

const keywords=[
"SELECT","FROM","WHERE","GROUP BY","ORDER BY",
"HAVING","LEFT JOIN","RIGHT JOIN","INNER JOIN",
"OUTER JOIN","JOIN","LIMIT","VALUES",
"INSERT INTO","UPDATE","DELETE","SET",
"CREATE TABLE","ALTER TABLE","DROP TABLE"
];

let formatted=sql;

keywords.forEach(function(keyword){

const regex=new RegExp(keyword,"gi");

formatted=formatted.replace(
regex,
"\n" + keyword.toUpperCase()
);

});

formatted=formatted
.replace(/\n+/g,"\n")
.trim();

document.getElementById("outputSql").value=formatted;

updateStats(sql,formatted);

setMessage(
"SQL formatted successfully.",
"success"
);

}

function updateStats(input,output){

document.getElementById("inputChars").textContent=input.length;
document.getElementById("outputChars").textContent=output.length;

document.getElementById("lineCount").textContent=
output
? output.split(/\r?\n/).length
: 0;

const keywordsFound=
(output.match(/\b(SELECT|FROM|WHERE|JOIN|GROUP BY|ORDER BY|HAVING|LIMIT|INSERT INTO|UPDATE|DELETE|SET)\b/gi)||[]).length;

document.getElementById("keywordCount").textContent=
keywordsFound;

}

function copyOutput(){

const text=document.getElementById("outputSql").value;

if(!text){
showToast("Nothing to copy","error");
return;
}

navigator.clipboard.writeText(text);

showToast("Copied");

}

function downloadSql(){

const text=document.getElementById("outputSql").value;

if(!text){
showToast("Nothing to download","error");
return;
}

const blob=new Blob(
[text],
{
type:"text/plain;charset=utf-8"
}
);

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="xavert-query.sql";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

URL.revokeObjectURL(link.href);

showToast("Download started");

}

function clearAll(){

document.getElementById("inputSql").value="";
document.getElementById("outputSql").value="";

document.getElementById("inputChars").textContent="0";
document.getElementById("outputChars").textContent="0";
document.getElementById("lineCount").textContent="0";
document.getElementById("keywordCount").textContent="0";

document.getElementById("message").textContent="";
document.getElementById("message").className="message";

}

</script>

</body>
</html>
